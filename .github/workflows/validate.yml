name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sh -n bootstrap.sh
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
      - run: BOOTSTRAP_DRY_RUN=1 sh ./bootstrap.sh

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - run: nix run nixpkgs#nixfmt-rfc-style -- --check $(find . -name '*.nix' -print)
      - run: nix flake check

  macos-dry-run:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: BOOTSTRAP_DRY_RUN=1 sh ./bootstrap.sh
